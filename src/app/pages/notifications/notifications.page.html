<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Notifications</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="markAllRead()">
        <ion-icon name="checkmark-done-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Unread Count -->
  <div class="notif-header">
    <p class="notif-count">{{ unreadCount }} unread notifications</p>
  </div>

  <!-- Notification Items -->
  <div class="notif-list">

    <div class="notif-item unread" *ngFor="let notif of notifications" [class.unread]="!notif.read">
      <div class="notif-icon-wrap" [ngClass]="notif.iconBg">
        <ion-icon [name]="notif.icon"></ion-icon>
      </div>
      <div class="notif-content">
        <p class="notif-title">{{ notif.title }}</p>
        <p class="notif-msg">{{ notif.message }}</p>
        <p class="notif-time">{{ notif.time }}</p>
      </div>
      <div class="notif-dot" *ngIf="!notif.read"></div>
    </div>

  </div>

</ion-content>
